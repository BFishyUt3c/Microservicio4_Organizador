version: "3.9"

services:
  ms4-organizador:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms4-organizador
    ports:
      - "8004:8004"
    environment:
      - MS1_URL=http://ms1-usuarios:8000
      - MS2_URL=http://ms2-peliculas:3000
      - MS3_URL=http://ms3-foro:8080
    depends_on:
      - ms1-usuarios
      - ms2-peliculas
      - ms3-foro
    networks:
      - cloud-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  cloud-network:
    driver: bridge
